<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade</title>
</head>

<body>

    <h1>Exercício Prático + Desafio</h1>

    <script>

        let numero1 = 10;
        let numero2 = 5;

        document.write("<h2>01. Crie duas variáveis numéricas</h2>");
        document.write("Número 1: " + numero1 + "<br>");
        document.write("Número 2: " + numero2 + "<br><br>");


        let soma = numero1 + numero2;
        let subtracao = numero1 - numero2;
        let multiplicacao = numero1 * numero2;
        let divisao = numero1 / numero2;

        document.write("<h2>02. Realize as quatro operações</h2>");
        document.write("Soma: " + soma + "<br>");
        document.write("Subtração: " + subtracao + "<br>");
        document.write("Multiplicação: " + multiplicacao + "<br>");
        document.write("Divisão: " + divisao + "<br><br>");


        document.write("<h2>03. Compare os valores</h2>");
        document.write("(numero1 > 0 && numero2 > 0): " + (numero1 > 0 && numero2 > 0) + "<br>");
        document.write("(numero1 < 0 || numero2 > 0): " + (numero1 < 0 || numero2 > 0) + "<br>");
        document.write("!(numero1 < numero2): " + (!(numero1 < numero2)) + "<br><br>");


        numero1++;
        numero2--;

        document.write("<h2>04. Use incremento e decremento</h2>");
        document.write("numero1 após incremento: " + numero1 + "<br>");
        document.write("numero2 após decremento: " + numero2 + "<br><br>");


        let nota = 8;
        let frequencia = 80;

        document.write("<h2>Desafio Extra</h2>");
        document.write("Nota: " + nota + "<br>");
        document.write("Frequência: " + frequencia + "%<br>");

        if (nota >= 7 && frequencia >= 75) {

            document.write("<strong>O aluno foi aprovado</strong>");

        } else {

            document.write("<strong>O aluno foi reprovado</strong>");

        }

    </script>

</body>

</html>
