<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nota</title>
</head>
<body>

<script>
    let nota = Number(prompt("Digite a nota:"));

    document.write("Nota digitada: " + nota + "<br>");

    if (nota >= 7) {
        document.write("Aprovado");
    } else if (nota >= 5) {
        document.write("Recuperação");
    } else {
        document.write("Reprovado");
    }
</script>

</body>
</html>
