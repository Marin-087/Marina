<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Parte 1 - if/else</title>
</head>
<body>

<script>
    let idade = Number(prompt("Digite a idade:"));

    document.write("Idade: " + idade + "<br>");

    if (idade >= 18) {
        document.write("Pode dirigir");
    } else {
        document.write("Não pode dirigir");
    }
</script>

</body>
</html>
