<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 5</title>
</head>
<body>

    <h1>Atividade 5</h1>

    <script>

        document.write("<h2>1 - FOR</h2>");
        for (let i = 1; i <= 10; i++) {
            document.write(i + "<br>");
        }

        document.write("<h2>2 - WHILE</h2>");
        let contador = 10;

        while (contador >= 1) {
            document.write(contador + "<br>");
            contador--;
        }

        document.write("<h2>3 - DO...WHILE</h2>");
        let numero = 1;

        do {
            document.write(numero + "<br>");
            numero++;
        } while (numero <= 5);

    </script>

</body>
</html>
